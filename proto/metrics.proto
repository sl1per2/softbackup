syntax = "proto3";
package obs;

message AgentMetrics {
  string agent_id = 1;
  string hostname = 2;
  double cpu_usage = 3;
  int32 memory_total_mb = 4;
  int32 memory_used_mb = 5;
  int32 disk_total_gb = 6;
  int32 disk_used_gb = 7;
  uint64 network_rx_bytes = 8;
  uint64 network_tx_bytes = 9;
  string timestamp = 10;
}

message TrafficStat {
  string job_id = 1;
  string agent_id = 2;
  uint64 original_size = 3;
  uint64 transferred_size = 4;
  double compression_ratio = 5;
  int32 cache_hits = 6;
  int32 zero_blocks = 7;
  int64 duration_ms = 8;
  double throughput_mbps = 9;
  string timestamp = 10;
}

message GlobalCacheStat {
  string agent_id = 1;
  int32 total_entries = 2;
  int64 hit_count = 3;
  int64 miss_count = 4;
  double hit_ratio = 5;
  uint64 size_bytes = 6;
  string last_reset_at = 7;
}

message BandwidthStats {
  double current_kbps = 1;
  double max_kbps = 2;
  double utilization_percent = 3;
}

message MetricsResponse {
  double cpu_usage = 1;
  int32 memory_usage_mb = 2;
  int32 disk_usage_percent = 3;
  int32 active_jobs = 4;
  int64 uptime_seconds = 5;
}
