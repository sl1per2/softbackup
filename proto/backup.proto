syntax = "proto3";
package obs;

message BackupJobConfig {
  repeated string source_paths = 1;
  repeated string exclude_patterns = 2;
  enum BackupType { FULL = 0; INCREMENTAL = 1; DIFFERENTIAL = 2; }
  BackupType backup_type = 3;
  int32 compression_level = 4;
  bool encryption_enabled = 5;
  int32 storage_id = 6;
  string job_id = 7;
  string agent_id = 8;
}

message BackupJobStatus {
  string job_id = 1;
  enum Status { PENDING = 0; RUNNING = 1; COMPLETED = 2; FAILED = 3; CANCELLED = 4; }
  Status status = 2;
  int32 progress_percent = 3;
  uint64 size_bytes = 4;
  uint64 size_transferred = 5;
  int32 chunks_total = 6;
  int32 chunks_cached = 7;
  uint64 dedup_saved = 8;
  double compression_ratio = 9;
  double cache_hit_ratio = 10;
  int32 zero_blocks_skipped = 11;
  string error_message = 12;
  string transport_mode_used = 13;
  string started_at = 14;
  string finished_at = 15;
}

message BackupChunk {
  int64 chunk_index = 1;
  bytes data = 2;
  string hash = 3;
  uint32 size = 4;
}

message RestoreRequest {
  string job_id = 1;
  string recovery_point_id = 2;
  string target_path = 3;
  enum RestoreType { FULL = 0; SELECTIVE = 1; }
  RestoreType restore_type = 4;
}

message RestoreProgress {
  string job_id = 1;
  uint64 restored_bytes = 2;
  uint64 total_bytes = 3;
  string current_file = 4;
}
