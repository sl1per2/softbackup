syntax = "proto3";
package obs;

message TrafficCommand {
  oneof command {
    StartTransferRequest start_transfer = 1;
    CancelTransferRequest cancel_transfer = 2;
    DigestRequest digest_exchange = 3;
  }
}

message StartTransferRequest {
  string job_id = 1;
  string source_path = 2;
  int32 dest_storage_id = 3;
  enum TransportMode { AUTO = 0; DIRECT_SAN = 1; HOT_ADD = 2; NETWORK = 3; NBD = 4; }
  TransportMode transport_mode = 4;
  int32 compression_level = 5;
  bool dedup_enabled = 6;
  string encryption_key_id = 7;
  int32 bandwidth_limit_kbps = 8;
  int32 streams_count = 9;
}

message CancelTransferRequest {
  string job_id = 1;
}

message DigestRequest {
  string agent_id = 1;
  repeated string chunk_hashes = 2;
}

message DigestResponse {
  repeated string known_hashes = 1;
}

message TransferProgress {
  string job_id = 1;
  uint64 total_bytes = 2;
  uint64 transferred_bytes = 3;
  double speed_bps = 4;
  int64 eta_seconds = 5;
  int32 cache_hits = 6;
  int32 zero_blocks = 7;
}

message TrafficStatsResponse {
  uint64 original_size = 1;
  uint64 transferred_size = 2;
  double compression_ratio = 3;
  double cache_hit_ratio = 4;
  uint64 bandwidth_saved_bytes = 5;
  int64 duration_ms = 6;
}
